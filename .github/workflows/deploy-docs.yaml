name: Deploy Docs

on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Run with tmate.io debugging enabled"
        required: false
        type: string
        default: "false"
      branch:
        description: "Git branch or ref to checkout"
        required: true
        type: string
      sanitized_branch:
        description: "URL-safe branch name for preview alias (auto-computed if empty)"
        required: false
        type: string
        default: ""
      environment:
        description: "Deployment environment (preview or production)"
        required: false
        type: string
        default: "preview"
      force_run:
        description: "Force execution even if already successful"
        required: false
        type: string
        default: "false"
  workflow_call:
    inputs:
      debug_enabled:
        description: "Run with tmate.io debugging enabled"
        required: false
        type: string
        default: "false"
      branch:
        description: "Git branch or ref to checkout"
        required: true
        type: string
      sanitized_branch:
        description: "URL-safe branch name for preview alias (auto-computed if empty)"
        required: false
        type: string
        default: ""
      environment:
        description: "Deployment environment (preview or production)"
        required: false
        type: string
        default: "production"
      force_run:
        description: "Force execution even if already successful"
        required: false
        type: string
        default: "false"

defaults:
  run:
    shell: bash

permissions:
  contents: read
  deployments: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment == 'preview' && format('https://b-{0}-infra-docs.sciexp.workers.dev', inputs.sanitized_branch || inputs.branch) || 'https://infra.cameronraysmith.net' }}
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0  # for git diff in composite action

      - name: Check execution cache
        id: cache
        uses: ./.github/actions/cached-ci-job
        with:
          check-name: preview-docs-deploy
          hash-sources: 'flake.lock flake.nix pkgs/by-name/vanixiets-docs/**/* modules/apps/docs/**/* modules/devshells/docs.nix packages/docs/**/* secrets/shared.yaml bun.lock .github/actions/setup-nix/action.yml .github/workflows/deploy-docs.yaml'
          force-run: ${{ inputs.force_run }}

      - name: Setup Nix
        if: steps.cache.outputs.should-run == 'true'
        uses: ./.github/actions/setup-nix
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        with:
          installer: full
          system: x86_64-linux

      - name: Setup tmate debug session
        if: inputs.debug_enabled == 'true' && steps.cache.outputs.should-run == 'true'
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101 # v3

      - name: Deploy to Cloudflare Workers
        if: steps.cache.outputs.should-run == 'true'
        id: deployment
        env:
          # SOPS_AGE_KEY decrypts secrets/shared.yaml at step time.
          # Per ADR-002 env-var contract, deploy.sh no longer calls
          # `sops exec-env` internally — the wrap moves to the caller.
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          GITHUB_ACTIONS: "true"
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
          DEPLOY_BRANCH: ${{ inputs.branch }}
        run: |
          # Use `nix develop -c` so sops is guaranteed on PATH
          # (setup-nix composite action provides nix, but not sops on
          # the bare runner); sops exec-env populates CLOUDFLARE_API_TOKEN
          # and CLOUDFLARE_ACCOUNT_ID before the nix-run invocation.
          # `sops exec-env` takes (file, single-shell-command-string) so
          # the nested nix-run invocation is a single quoted string.
          if [ "$DEPLOY_ENVIRONMENT" = "preview" ]; then
            nix develop --accept-flake-config -c \
              sops exec-env secrets/shared.yaml \
              "nix run --accept-flake-config .#deploy-docs -- preview \"$DEPLOY_BRANCH\""
          else
            nix develop --accept-flake-config -c \
              sops exec-env secrets/shared.yaml \
              "nix run --accept-flake-config .#deploy-docs -- production"
          fi

      - name: Create job result marker
        if: success() && steps.cache.outputs.should-run == 'true'
        shell: bash
        run: |
          mkdir -p "${{ steps.cache.outputs.cache-path }}"
          cat > "${{ steps.cache.outputs.cache-path }}/marker" <<EOF
          {
            "success": true,
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "cache_key": "${{ steps.cache.outputs.cache-key }}",
            "workflow_run_id": "${{ github.run_id }}",
            "environment": "${{ inputs.environment }}",
            "branch": "${{ inputs.branch }}"
          }
          EOF

      - name: Save job result to cache
        if: success() && steps.cache.outputs.should-run == 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.cache.outputs.cache-path }}
          key: ${{ steps.cache.outputs.cache-key }}
