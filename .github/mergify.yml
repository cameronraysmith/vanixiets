shared:
  base_conditions: &base_conditions
    - label!=work-in-progress
    - -draft
    - -conflict

  required_checks: &required_checks
    # Buildbot-nix checks
    - check-success=buildbot/nix-eval
    - check-success=buildbot/nix-build
    - check-success=buildbot/nix-effects

  human_author_conditions: &human_author_conditions
    - author!=renovate[bot]
    - author!=mergify[bot]
    - author!=github-actions[bot]
    - "author!=vanixiets-flake-updater[bot]"
    - label!=flake-update

  bot_author_conditions: &bot_author_conditions
    - or:
        - author=renovate[bot]
        - author=mergify[bot]
        - author=github-actions[bot]
        - "author=vanixiets-flake-updater[bot]"
        - label=flake-update

pull_request_rules:
  - name: self-assign PRs
    conditions:
      - -merged
      - -closed
      - "#assignee=0"
    actions:
      assign:
        add_users:
          - "{{ author }}"

  - name: auto-approve owner-authored PRs with label
    conditions:
      - author=cameronraysmith
      - label=author-approved
    actions:
      review:
        type: APPROVE
        message: Owner self-approval via author-approved label

  # Optional: uncomment to auto-approve bot PRs (currently requires manual approval)
  # - name: auto-approve bot PRs
  #   conditions:
  #     - or:
  #       - author=renovate[bot]
  #       - author=mergify[bot]
  #       - author=github-actions[bot]
  #       - author=vanixiets-flake-updater[bot]
  #   actions:
  #     review:
  #       type: APPROVE
  #       message: Automated approval for bot PR

  - name: queue human PRs
    conditions:
      - "#approved-reviews-by>=1"
      - and: *base_conditions
      - and: *human_author_conditions
      - and: *required_checks
    actions:
      queue:
        name: default

  - name: queue bot PRs
    conditions:
      - "#approved-reviews-by>=1"
      - and: *base_conditions
      - and: *bot_author_conditions
      - and: *required_checks
    actions:
      queue:
        name: bot-updates

queue_rules:
  # Human PRs: fast-forward merge preserves original commit SHAs end-to-end
  - name: default
    merge_method: fast-forward
    update_method: rebase
    update_bot_account: cameronraysmith
    batch_size: 1
    checks_timeout: 3600
    queue_conditions:
      - -conflict
    merge_conditions:
      - and: *required_checks

  # Bot PRs: squash merge with batching for CI efficiency
  - name: bot-updates
    merge_method: rebase
    update_method: rebase
    update_bot_account: cameronraysmith
    batch_size: 20
    batch_max_wait_time: 3m
    checks_timeout: 3600
    queue_conditions:
      - -conflict
    merge_conditions:
      - and: *required_checks

