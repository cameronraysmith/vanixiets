[global]
remove_todos = false
remove_fixme = false
remove_docs = false
use_default_ignores = true
respect_gitignore = true
traverse_git_repos = false
# Substring, case-sensitive, whole-comment match. Over-preservation is the intended
# safe bias. Applies to every language via global->language merge.
preserve_patterns = [
  # existing generated defaults
  "HACK", "WORKAROUND", "NOTE", "XXX",
  # license / SPDX / copyright (covers banners beyond the built-in first-10-lines rule)
  "SPDX", "SPDX-License-Identifier",
  "Copyright", "copyright", "COPYRIGHT",
  "License", "license", "LICENSE",
  "@license", "@copyright", "(c)", "(C)",
  # encoding / coding declarations (built-in misses "coding:")
  "coding:", "encoding:", "-*- coding",
  # code-generation / managed-block markers (built-in only covers first 10 lines)
  "DO NOT EDIT", "do not edit", "DO NOT MODIFY", "do not modify",
  "@generated", "Code generated", "Generated by", "GENERATED", "AUTO-GENERATED",
  "autogenerated", "auto-generated",
  "BEGIN ", "END ",              # managed-block sentinels; broad, intentionally over-preserving
  # Rust SAFETY (not covered by any built-in) and unsafe rationale
  "SAFETY:", "SAFETY",
  # linter / type-checker pragmas (redundant with use_default_ignores; robust if it is disabled)
  "type: ignore", "type:ignore", "noqa", "pyright:", "ruff:", "mypy:", "pylint:", "flake8:",
  "shellcheck disable", "shellcheck source", "hadolint ignore",
  "yamllint disable", "yamllint enable",
  "tflint-ignore", "tfsec:ignore", "checkov:skip", "trivy:ignore",
  "eslint-", "@ts-expect-error", "@ts-ignore", "@ts-nocheck", "@ts-check",
  "biome-ignore", "deno-lint-ignore", "deno-fmt-ignore",
  # formatter directives
  "prettier-ignore", "fmt: off", "fmt: on", "fmt:off", "fmt:on",
  "rustfmt::", "rustfmt", "clang-format off", "clang-format on",
  # Rust attribute-ish / GHC pragmas that may surface as comments
  "clippy::", "allow(", "deny(", "warn(", "forbid(", "expect(", "cfg(", "{-#",
  # Go / general
  "//go:", "nolint",
]

[languages.nix]
name = "Nix"
extensions = [".nix"]
comment_nodes = ["comment"]

[languages.xml]
name = "XML"
extensions = [".xml", ".xsd", ".xsl", ".xslt", ".svg"]
comment_nodes = ["Comment"]

[languages.typescript]
name = "TypeScript"
extensions = [".ts", ".tsx", ".mts", ".cts", ".d.ts"]
comment_nodes = ["comment"]
preserve_patterns = ["@ts-expect-error", "@ts-ignore", "eslint-"]
